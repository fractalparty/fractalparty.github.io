        /* --- PARTY WORLD NAVIGATION --- */
        .hamburger {
            position: fixed; top: 20px; left: 20px;
            z-index: 2001; cursor: pointer;
            display: flex; flex-direction: column; gap: 5px;
            background: rgba(0, 0, 0, 0.7); padding: 10px;
            border-radius: 5px; border: 1px solid white;
        }
        .hamburger span { display: block; width: 30px; height: 4px; background: white; }

        .side-menu {
            height: 100%; width: 250px; position: fixed;
            z-index: 2000; top: 0; left: -250px;
            background-color: rgba(0, 0, 0, 0.6); 
            transition: 0.5s; padding-top: 80px;
            backdrop-filter: blur(5px);
        }
        .side-menu.active { left: 0; }
        .side-menu a {
            padding: 15px 30px; text-decoration: none;
            font-size: 1.1rem; color: #fff; display: block;
            text-shadow: 2px 2px #000;
        }
        .side-menu a:hover { color: #00ffff; }

        /* Unity likes to take up the whole screen */
        #unity-container { width: 100%; height: 100%; }
    </style>
