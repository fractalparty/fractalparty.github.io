<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/gladihoppper/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Party World - Gladihoppers</title>

    <link rel="stylesheet" href="/style.css?v=1">

    <style>
        html, body {
            margin: 0; padding: 0;
            background: black !important;
            overflow: hidden;
            height: 100%; width: 100%;
        }

        #unity-container { width: 75%; height: 75%; }

        /* Force your menu classes to violently stay on top of everything */
        .hamburger, [class*="hamburger"], #hamburger-button { 
            z-index: 2147483647 !important; /* Maximum possible 32-bit integer z-index */
            position: fixed !important; 
            display: block !important; 
            visibility: visible !important;
            opacity: 1 !important;
        }
        .side-menu, [class*="side-menu"] { 
            z-index: 2147483646 !important; 
            position: fixed !important; 
        }

        /* Generic cleanup rules targeting any potential background blocks Poki uses */
        #poki-sdk-container, #poki-sdk-root, .poki-sdk-container,
        div[class*="poki"], div[id*="poki"], 
        div[style*="background-color: rgb(0,"] {
            background: transparent !important;
            background-color: transparent !important;
        }
    </style>

    <script>
        window.fileMergerConfig = {
            files: [
                { name: 'Gladihoppers.data.unityweb', parts: 2 },
                { name: 'Gladihoppers.wasm.code.unityweb', parts: 2 },
            ],
            basePath: 'Build/',
            debug: true
        };
    </script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/merge.js"></script>
    <script>
        window.config = {
            loader: 'unity',
            debug: false,
            maxRatio: 16 / 9,
            minRatio: 9 / 16,
            title: 'Gladihoppers',
            thumbnail: 'patch/png/null.png',
            numScreenshots: 5,
            unityVersion: '2019.3.13f1',
            unityWebglBuildUrl: 'Build/Gladihoppers.json',
            fileSize: 23,
            cachedDecompressedFileSizes: {
                'Gladihoppers.data.unityweb': 17409938,
                'Gladihoppers.wasm.code.unityweb': 6410659,
                'Gladihoppers.wasm.framework.unityweb': 91463,
            },
        };
    </script>
</head>
<body>

    <script src="patch/js/poki-master-loader.js"></script>
    <script src="/menu.js?v=1"></script>

    <script>
        // 1. Max out z-index on the absolute maximum value
        const forceMenuToTop = () => {
            const menuElements = document.querySelectorAll('.hamburger, .side-menu, [class*="hamburger"]');
            menuElements.forEach(el => {
                el.style.setProperty('z-index', '2147483647', 'important');
                el.style.setProperty('position', 'fixed', 'important');
                el.style.setProperty('display', 'block', 'important');
                el.style.setProperty('visibility', 'visible', 'important');
                el.style.setProperty('opacity', '1', 'important');
            });

            // Find any heavy blue/colored background screens injected by Poki and clear them out
            const blueBlockers = document.querySelectorAll('div[style*="position: absolute"], div[style*="position: fixed"]');
            blueBlockers.forEach(div => {
                const bg = div.style.backgroundColor || '';
                // Checks if it's not our components and has a solid background blocking the app
                if (!div.classList.contains('hamburger') && !div.classList.contains('side-menu') && (bg.includes('rgb') || bg.includes('#'))) {
                    // Turn it transparent and stop it from blocking clicks
                    div.style.setProperty('background', 'transparent', 'important');
                    div.style.setProperty('background-color', 'transparent', 'important');
                    div.style.setProperty('pointer-events', 'none', 'important');
                }
            });
        };

        // Run immediately
        forceMenuToTop();

        // 2. Continually watch the page for changes (handles lagging script injections)
        const observer = new MutationObserver((mutations) => {
            forceMenuToTop();
        });

        observer.observe(document.body, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ['style', 'class']
        });

        // Run one last time when loading finishes
        window.addEventListener('load', forceMenuToTop);
    </script>
</body>
</html>
