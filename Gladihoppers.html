<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/gladihoppper/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Party World - Gladihoppers</title>

    <link rel="stylesheet" href="/style.css?v=1">

    <style>
        html, body {
            margin: 0; padding: 0;
            background: black !important; /* Force black background */
            overflow: hidden;
            height: 100%; width: 100%;
        }

        /* Unity specific styles */
        #unity-container { width: 75%; height: 75%; }

        /* Force the shared menu to stay on top of Unity and Poki loaders */
        .hamburger { 
            z-index: 99999999 !important; 
            position: fixed !important; 
            display: block !important; 
            visibility: visible !important;
            opacity: 1 !important;
        }
        .side-menu { 
            z-index: 99999998 !important; 
            position: fixed !important; 
        }

        /* DESTROY THE POKI BLUE LOADER BACKGROUND & OVERLAYS */
        #poki-sdk-container, 
        div[class*="poki"], 
        div[id*="poki"],
        div[style*="background-color"][style*="position: fixed"] {
            background: transparent !important;
            background-color: transparent !important;
            pointer-events: none; /* Allows clicks to pass through invisible leftover overlays */
        }

        /* If Poki injects a specific splash wrapper blocking the screen, this neutralizes it */
        .poki-loader, #poki-loader {
            display: none !important;
            visibility: hidden !important;
            background: none !important;
        }
    </style>

    <script>
        window.fileMergerConfig = {
            files: [
                { name: 'Gladihoppers.data.unityweb', parts: 2 },
                { name: 'Gladihoppers.wasm.code.unityweb', parts: 2 },
            ],
            basePath: 'Build/',
            debug: true
        };
    </script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/merge.js"></script>
    <script>
        window.config = {
            loader: 'unity',
            debug: false,
            maxRatio: 16 / 9,
            minRatio: 9 / 16,
            title: 'Gladihoppers',
            thumbnail: 'patch/png/null.png',
            numScreenshots: 5,
            unityVersion: '2019.3.13f1',
            unityWebglBuildUrl: 'Build/Gladihoppers.json',
            fileSize: 23,
            cachedDecompressedFileSizes: {
                'Gladihoppers.data.unityweb': 17409938,
                'Gladihoppers.wasm.code.unityweb': 6410659,
                'Gladihoppers.wasm.framework.unityweb': 91463,
            },
        };
    </script>
</head>
<body>

    <script src="patch/js/poki-master-loader.js"></script>

    <script src="/menu.js?v=1"></script>
</body>
</html>
