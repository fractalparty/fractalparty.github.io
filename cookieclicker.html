<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Party World - Cookie Clicker</title>
    <link rel="stylesheet" href="/style.css">

    <script>
        var VERSION=2.058;
        var BETA=0;
        var SAVESUFFIX='';
        var App=0;
        var PRESETMODS=[];
        var LOCAL=true; 
        // Important: This tells Cookie Clicker's main script where to find images/sounds
        var GameLink = "https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/cookieclicker/";
    </script>

    <meta name="viewport" content="width=900, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/cookieclicker/style.css?v=10c" rel="stylesheet" type="text/css">
    
    <style>
        /* Cookie clicker has a massive z-index, we must go HIGHER */
        .hamburger { z-index: 2000000 !important; position: fixed !important; }
        .side-menu { z-index: 1999999 !important; position: fixed !important; }
        #wrapper { z-index: 1; }
    </style>
</head>
<body>

<div id="wrapper">
	<div id="topBar">
		<div><a href="/"><b>← BACK HOME</b></a></div>
	</div>
	<div id="game">
		<div id="offGameMessageWrap">
			<div id="offGameMessage">
				<div id="loader">
					<div id="loading" class="title">Loading Cookie Clicker...</div>
				</div>
			</div>
		</div>
		<canvas id="backgroundCanvas"></canvas>
		<div id="sectionLeft" class="inset">
			<canvas id="backgroundLeftCanvas" style="z-index:5;"></canvas>
			<div id="cookieAnchor">
				<button id="bigCookie"></button>
				<div id="cookieNumbers"></div>
			</div>
		</div>
		<div id="sectionMiddle" class="inset">
			<div id="comments" class="inset title">
				<div id="prefsButton" class="panelButton"><div class="subButton">Options</div></div>
				<div id="statsButton" class="panelButton"><div>Stats</div></div>
				<div id="menu"></div>
			</div>
		</div>
		<div id="sectionRight" class="inset">
			<div id="store">
				<div id="products"></div>
			</div>
		</div>
	</div>
</div>

<script src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/cookieclicker/base64.js"></script>
<script src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/cookieclicker/main2.js?v=13g"></script>

<script src="/menu.js"></script>

</body>
</html>
