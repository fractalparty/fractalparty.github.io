<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Party World - BTD5</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
      height: 100%;
      width: 100%;
      font-family: 'Brush Script MT', cursive;
    }

    /* --- HAMBURGER MENU BUTTON --- */
    .hamburger {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 2001; /* Above everything */
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 5px;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px;
        border-radius: 5px;
        border: 1px solid white;
    }

    .hamburger span {
        display: block;
        width: 30px;
        height: 4px;
        background-color: white;
        transition: 0.3s;
    }

    /* --- SLIDING INDEX POPUP (60% Transparent) --- */
    .side-menu {
        height: 100%;
        width: 250px;
        position: fixed;
        z-index: 2000;
        top: 0;
        left: -250px; /* Hidden off-screen */
        background-color: rgba(0, 0, 0, 0.6); 
        overflow-x: hidden;
        transition: 0.5s;
        padding-top: 80px;
        backdrop-filter: blur(5px);
    }

    .side-menu a {
        padding: 15px 30px;
        text-decoration: none;
        font-size: 1.1rem;
        color: #fff;
        display: block;
        transition: 0.3s;
        text-shadow: 2px 2px #000;
    }

    .side-menu a:hover {
        color: #ff00ff;
        padding-left: 45px;
    }

    /* Logic for when the menu is open */
    .side-menu.active {
        left: 0;
    }

    /* --- GAME CONTAINER --- */
    #flash-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: black;
      z-index: 1;
    }

    ruffle-player {
      width: 100%;
      height: 100%;
      background: black;
      display: block;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.2.0-nightly.2025.10.2/ruffle.min.js"></script>
</head>
<body>

  <div class="hamburger" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
  </div>

  <div id="indexMenu" class="side-menu">
      <a href="index.html">Home</a>
      <a href="/bindingofisaacwotl.html">The Binding of Isaac</a>
      <a href="/BTD5.html">BTD5</a>
       <a href="/Gladihoppers.html">Gladihoppers</a>
  </div>

  <div id="flash-container"></div>

  <script>
    // --- Menu Logic ---
    function toggleMenu() {
        const menu = document.getElementById("indexMenu");
        menu.classList.toggle("active");
    }

    // --- Game Logic ---
    const container = document.getElementById("flash-container");

    function resizeGame() {
      const windowWidth = window.innerWidth;
      const windowHeight = window.innerHeight;
      const aspectRatio = 4 / 3;

      let width = Math.floor(windowWidth);
      let height = Math.floor(windowWidth / aspectRatio);

      if (height > windowHeight) {
        height = Math.floor(windowHeight);
        width = Math.floor(height * aspectRatio);
      }

      container.style.width = `${width}px`;
      container.style.height = `${height}px`;
    }

    window.addEventListener("resize", resizeGame);
    window.addEventListener("DOMContentLoaded", () => {
      resizeGame();

      const ruffle = window.RufflePlayer?.newest() || window.RufflePlayer?.createPlayer();
      if (ruffle && container) {
        const player = ruffle.createPlayer();
        player.style.width = "100%";
        player.style.height = "100%";
        player.style.background = "black";
        container.appendChild(player);
        // Loading the specific SWF link you provided
        player.load("https://cdn.jsdelivr.net/gh/bubbls/UGS-file-encryption@b6b363179429fc584fac223384f1b45cc419d1a7/WDzRSvadTXBNOR.swf");
      } else {
        container.textContent = "Ruffle failed to load."; 
      }
    });
  </script>
</body>
</html>
