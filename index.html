<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Chud Chat</title>

<style>

body{
font-family:Comic Sans MS;
background:#f2f2f2;
padding:10px;
}

#chat{
height:500px;
overflow-y:auto;
background:white;
border:1px solid #ccc;
padding:10px;
margin-bottom:10px;
}

.message{
margin:5px 0;
}

</style>

</head>

<body>

Name:
<input id="name">

Color:
<input type="color" id="color" value="#000000">

<div id="chat"></div>

<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyAdinKHZS2re5gfvMkI0BvLGUdkFHieVuM",
authDomain: "chud-chat-5210f.firebaseapp.com",
databaseURL: "https://chud-chat-5210f-default-rtdb.firebaseio.com",
projectId: "chud-chat-5210f"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db,"messages");


const ADMIN_PASSWORD = "admin132";
let isAdmin = false;


const blacklist = [
"nigger",
"nigga"
];


function containsBadWord(text){

const lower=text.toLowerCase();

for(let word of blacklist){
if(lower.includes(word)){
return true;
}
}

return false;

}


window.send = async function(){

const name=document.getElementById("name").value || "Anonymous";
const color=document.getElementById("color").value;
let text=document.getElementById("msg").value;

if(text.trim()=="") return;


/* COMMANDS */

if(text.startsWith("/")){

const parts=text.split(" ");
const command=parts[0];


if(command==="/admin"){

if(parts[1]===ADMIN_PASSWORD){
isAdmin=true;
alert("Admin mode enabled");
}else{
alert("Wrong password");
}

return;
}


if(command === "/clear"){

if(!isAdmin){
alert("Admin only");
return;
}

remove(messagesRef).then(() => {

push(messagesRef,{
name:"SYSTEM",
color:"#ff0000",
text:"Chat cleared by admin"
});

document.getElementById("chat").innerHTML = "";

});

return;
}


if(command==="/announce"){

if(!isAdmin){
alert("Admin only");
return;
}

const msg=parts.slice(1).join(" ");

push(messagesRef,{
name:"ADMIN",
color:"#ff0000",
text:msg
});

return;
}

}


/* FILTER */

if(containsBadWord(text)){
alert("Message blocked");
return;
}


/* SEND MESSAGE */

push(messagesRef,{
name,
color,
text
});

document.getElementById("msg").value="";

};


document.getElementById("msg").addEventListener("keypress",function(e){

if(e.key==="Enter"){
send();
}

});


onChildAdded(messagesRef,(data)=>{

const m=data.val();

const div=document.createElement("div");
div.className="message";

div.innerHTML=
"<span style='color:"+m.color+";font-weight:bold'>"+
m.name+
"</span>: "+m.text;

document.getElementById("chat").appendChild(div);

document.getElementById("chat").scrollTop=
document.getElementById("chat").scrollHeight;

});

</script>

</body>
</html>
