<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GIF Haven</title>
    <style>
        body {
            background-size: auto;
            background-repeat: repeat;
            background-attachment: fixed;
            color: white;
            font-family: "Courier New", Courier, monospace;
            text-align: center;
            padding-top: 15vh;
            margin: 0;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0px 3px 5px rgba(0,0,0,0.8);
        }
        h1 { font-size: 3.5rem; }
        p { font-size: 1.5rem; }
    </style>
</head>
<body>

    <h1>Welcome to My Site</h1>
    <p>Now pulling from the backgrounds folder!</p>

    <script>
        // Your list of filenames stays exactly the same
        const backgrounds = [
            'rainbowstr.gif', '646.GIF', '336.GIF', '062.GIF', '1020.GIF',
            '114.GIF', '1019.GIF', '087.GIF', '083.GIF', '067.GIF',
            '650.GIF', '1008.GIF', '061.GIF', '058.GIF', '024.GIF',
            'qcu50119.jpg', 'pasta1.jpg', 'coins.jpg', 'cio61007.jpg', 'ahm60071.jpg',
            'bubblespurplebg.jpg', 'water1_ripple.jpg', 'SD175.JPG', 'OPOCEAN2.jpg', 'qhk50103.jpg',
            'pdj50131.gif', 'Painting.png', 'PLANTS3.JPG', 'giraffe195.jpg', 'WINDOW14.jpg', 
            'BUILD233.jpg', 'BUILD063.jpg', 'EARTH_C.JPG', 'manyfish.jpg', 'qcu50122.jpg'
        ];

        const randomIndex = Math.floor(Math.random() * backgrounds.length);
        const selectedImage = backgrounds[randomIndex];

        // NEW STEP: We add 'backgrounds/' before the filename so the browser finds it
        document.body.style.backgroundImage = `url('backgrounds/${selectedImage}')`;
    </script>

</body>
</html>
