<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GIF Haven</title>
    <style>
        body {
            background-size: auto;
            background-repeat: repeat;
            background-attachment: fixed;
            color: white;
            font-family: "Courier New", Courier, monospace;
            text-align: center;
            padding-top: 15vh;
            margin: 0;
            /* Strong shadow to ensure text is visible on any background */
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0px 3px 5px rgba(0,0,0,0.8);
            /* Fallback color in case an image fails to load */
            background-color: #222; 
        }
        h1 { font-size: 3.5rem; }
        p { font-size: 1.5rem; }
    </style>
</head>
<body>

    <h1>Welcome to My Site</h1>
    <p>Every refresh brings a new look!</p>

    <script>
        const backgrounds = [
            // GIFs
            'rainbowstr.gif', '646.GIF', '336.GIF', '062.GIF', '1020.GIF',
            '114.GIF', '1019.GIF', '087.GIF', '083.GIF', '067.GIF',
            '650.GIF', '1008.GIF', '061.GIF', '058.GIF', '024.GIF',
            'pdj50131.gif',

            // JPGs (Checked for exact capitalization)
            'qcu50119.jpg', 'pasta1.jpg', 'coins.jpg', 'cio61007.jpg', 
            'ahm60071.jpg', 'bubblespurplebg.jpg', 'water1_ripple.jpg', 
            'SD175.JPG', 'OPOCEAN2.jpg', 'qhk50103.jpg', 'PLANTS3.JPG', 
            'giraffe195.jpg', 'WINDOW14.jpg', 'BUILD233.jpg', 'BUILD063.jpg', 
            'EARTH_C.JPG', 'manyfish.jpg', 'qcu50122.jpg',

            // PNGs
            'Painting.png'
        ];

        const randomIndex = Math.floor(Math.random() * backgrounds.length);
        const selectedImage = backgrounds[randomIndex];

        // Apply the background from the backgrounds folder
        document.body.style.backgroundImage = `url('backgrounds/${selectedImage}')`;
    </script>

</body>
</html>
