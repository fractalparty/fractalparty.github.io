<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chud Chat</title>

<style>

body{
font-family:Comic Sans MS;
background:#f2f2f2;
padding:10px;
}

#chat{
height:300px;
overflow-y:auto;
background:white;
border:1px solid #ccc;
padding:10px;
margin-bottom:10px;
}

.message{
margin:5px 0;
}

</style>

</head>

<body>

Name:
<input id="name">

Color:
<input type="color" id="color" value="#000000">

<div id="chat"></div>

<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyAdinKHZS2re5gfvMkI0BvLGUdkFHieVuM",
authDomain: "chud-chat-5210f.firebaseapp.com",
databaseURL: "https://chud-chat-5210f-default-rtdb.firebaseio.com",
projectId: "chud-chat-5210f"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db,"messages");


const blacklist = [
"nigger",
"nigga",
"Oliver Hudson"
];


function containsBadWord(text){

const lower=text.toLowerCase();

for(let word of blacklist){

if(lower.includes(word)){
return true;
}

}

return false;

}


window.send = function(){

const name=document.getElementById("name").value || "Anonymous";
const color=document.getElementById("color").value;
let text=document.getElementById("msg").value;

if(text.trim()=="") return;

if(containsBadWord(text)){
alert("Message blocked");
return;
}

push(messagesRef,{
name,
color,
text
});

document.getElementById("msg").value="";

};


onChildAdded(messagesRef,(data)=>{

const m=data.val();

const div=document.createElement("div");
div.className="message";

div.innerHTML=
"<span style='color:"+m.color+";font-weight:bold'>"+
m.name+
"</span>: "+m.text;

document.getElementById("chat").appendChild(div);

});

</script>

</body>
</html>
