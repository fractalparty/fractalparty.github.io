<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party World</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            background-size: auto;
            background-repeat: repeat;
            background-attachment: fixed;
            color: white;
            font-family: 'Brush Script MT', cursive;
            margin: 0;
            /* Flexbox makes perfect centering easy */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Takes up full screen height */
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0px 3px 5px rgba(0,0,0,0.8);
            background-color: #222; 
            overflow: hidden; /* Prevents scrollbars if background GIFs are weird sizes */
        }

        h1 { 
            font-size: 5rem; /* Larger title for the middle */
            cursor: help;
            margin: 0;
        }

    </style>
</head>
<body>

    <h1>Party World</h1>

    <script>
        // --- Background Logic ---
        const backgrounds = [
            '024.GIF', '058.GIF', '061.GIF', '062.GIF', '067.GIF', 
            '083.GIF', '087.GIF', '1008.GIF', '1019.GIF', '1020.GIF', 
            '114.GIF', '336.GIF', '646.GIF', '650.GIF',
            'pdj50131.gif', 'pdj50138.gif', 'rainbowstr.gif',
            'BUILD063.png', 'BUILD233.png', 'Painting.png', 'WINDOW14.png',
            'EARTH_C.JPG', 'OPOCEAN2.JPG', 'PLANTS3.JPG', 'SD175.JPG',
            'ahm60071.jpg', 'bubblespurplebg.jpg', 'cio61007.jpg', 
            'coins.jpg', 'giraffe195.jpg', 'manyfish.jpg', 'pasta1.jpg',
            'pdk50102.jpg', 'qcu50119.jpg', 'qcu50122.jpg', 'qhk50103.jpg', 
            'water1_ripple.jpg'
        ];

        const randomIndex = Math.floor(Math.random() * backgrounds.length);
        const selectedImage = backgrounds[randomIndex];
        document.body.style.backgroundImage = `url('backgrounds/${selectedImage}')`;
    </script>

    <script src="/menu.js"></script>
</body>
</html>
