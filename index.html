<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyAdinKHZS2re5gfvMkI0BvLGUdkFHieVuM",
authDomain: "chud-chat-5210f.firebaseapp.com",
databaseURL: "https://chud-chat-5210f-default-rtdb.firebaseio.com",
projectId: "chud-chat-5210f"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db,"messages");


/* ADMIN SYSTEM */

const ADMIN_PASSWORD = "admin132";
let isAdmin = false;


/* BLACKLIST */

const blacklist = [
"nigger",
"nigga"
];


function containsBadWord(text){

const lower=text.toLowerCase();

for(let word of blacklist){

if(lower.includes(word)){
return true;
}

}

return false;

}


/* SEND MESSAGE */

window.send = function(){

const name=document.getElementById("name").value || "Anonymous";
const color=document.getElementById("color").value;
let text=document.getElementById("msg").value;

if(text.trim()=="") return;


/* COMMAND SYSTEM */

if(text.startsWith("/")){

const parts = text.split(" ");
const command = parts[0];


/* ADMIN LOGIN */

if(command === "/admin"){

if(parts[1] === ADMIN_PASSWORD){

isAdmin = true;

alert("Admin mode enabled");

}else{

alert("Wrong password");

}

return;

}


/* CLEAR CHAT */

if(command === "/clear"){

if(!isAdmin){
alert("Admin only");
return;
}

remove(messagesRef);

push(messagesRef,{
name:"SYSTEM",
color:"#ff0000",
text:"Clear"
});

return;

}


/* ANNOUNCE MESSAGE */

if(command === "/announce"){

if(!isAdmin){
alert("Admin only");
return;
}

const msg = parts.slice(1).join(" ");

push(messagesRef,{
name:"ADMIN",
color:"#ff0000",
text:msg
});

return;

}

}


/* BLACKLIST FILTER */

if(containsBadWord(text)){
alert("Message blocked");
return;
}


/* SEND TO FIREBASE */

push(messagesRef,{
name,
color,
text
});

document.getElementById("msg").value="";

};


/* RECEIVE MESSAGES */

onChildAdded(messagesRef,(data)=>{

const m=data.val();

const div=document.createElement("div");
div.className="message";

div.innerHTML =
"<span style='color:"+m.color+";font-weight:bold'>"+
m.name+
"</span>: "+m.text;

document.getElementById("chat").appendChild(div);

/* auto scroll */

document.getElementById("chat").scrollTop =
document.getElementById("chat").scrollHeight;

});

</script>
